name: Keep Streamlit App Alive

on:
  schedule:
    # Runs every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows manual triggering

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    
    steps:
      - name: Ping Streamlit App
        run: |
          APP_URL="https://lazyboyzoomattendance.streamlit.app/"
          echo "Pinging Streamlit app at: $APP_URL"
          
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$APP_URL")
          
          if [ "$RESPONSE" -eq 200 ]; then
            echo "✅ App is alive! HTTP status: $RESPONSE"
          else
            echo "⚠️ Unexpected HTTP status: $RESPONSE"
            exit 1
          fi
