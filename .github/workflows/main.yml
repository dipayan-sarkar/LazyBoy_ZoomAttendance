name: Keep Streamlit App Alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Streamlit App
        run: |
          APP_URL="https://lazyboyzoomattendance.streamlit.app/"
          echo "Pinging Streamlit app at: $APP_URL"

          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 60 \
            --retry 3 \
            --retry-delay 10 \
            --retry-all-errors \
            -L \
            "$APP_URL")

          echo "HTTP Response Code: $RESPONSE"

          if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 302 ] || [ "$RESPONSE" -eq 301 ]; then
            echo "✅ App pinged successfully! HTTP status: $RESPONSE"
          else
            echo "⚠️ Received HTTP status: $RESPONSE — app may be starting up, not treating as failure"
          fi
