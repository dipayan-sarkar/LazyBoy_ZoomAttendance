name: Keep Streamlit App Alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Streamlit App
        run: |
          APP_URL="https://lazyboyzoomattendance.streamlit.app/"
          echo "Pinging Streamlit app at: $APP_URL"

          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 60 \
            --max-redirs 10 \
            -L \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36" \
            "$APP_URL")

          echo "HTTP Response Code: $RESPONSE"

          if [ "$RESPONSE" -ge 200 ] && [ "$RESPONSE" -lt 400 ]; then
            echo "✅ App pinged successfully! HTTP status: $RESPONSE"
          else
            echo "ℹ️ App responded with HTTP status: $RESPONSE — may be waking up"
          fi
